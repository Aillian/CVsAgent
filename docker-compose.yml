# =============================================================================
# CVsAgent – docker-compose
#
# Default:
#   docker compose run --rm cli --help
#   docker compose run --rm cli --cv-dir /data/CVs --format xlsx
#
# Future UI (placeholder wired up now so it's ready to enable):
#   docker compose --profile ui up
# =============================================================================

services:
  cli:
    build:
      context: .
      target: cli
    image: cvsagent:cli
    env_file:
      - path: .env
        required: false
    environment:
      - CVSAGENT_CV_DIR=/data/CVs
      - CVSAGENT_OUTPUT_DIR=/data/output
      - CVSAGENT_CACHE_DIR=/data/.cvsagent_cache
    volumes:
      - ./CVs:/data/CVs
      - ./output:/data/output
      - cvsagent_cache:/data/.cvsagent_cache
    # stdin_open + tty keep the Rich progress bar pretty when using `run`.
    stdin_open: true
    tty: true

  # ---------------------------------------------------------------------------
  # Future web UI — not yet implemented. Left here so that adding the UI
  # only needs code + deps changes, not compose changes.
  # Launch once ready with:  docker compose --profile ui up
  # ---------------------------------------------------------------------------
  ui:
    profiles: ["ui"]
    build:
      context: .
      target: ui
    image: cvsagent:ui
    env_file:
      - path: .env
        required: false
    environment:
      - CVSAGENT_CV_DIR=/data/CVs
      - CVSAGENT_OUTPUT_DIR=/data/output
      - CVSAGENT_CACHE_DIR=/data/.cvsagent_cache
    ports:
      - "8501:8501"
    volumes:
      - ./CVs:/data/CVs
      - ./output:/data/output
      - cvsagent_cache:/data/.cvsagent_cache
    depends_on:
      - cli

volumes:
  cvsagent_cache:
